# =============================================
# Perfil de pruebas
# =============================================
# La conexion real a MongoDB la inyecta Testcontainers via @ServiceConnection.
# Este valor es solo un fallback para que no quede el placeholder ${MONGODB_URI}
# sin resolver; en tiempo de ejecucion lo sobreescribe el contenedor.
spring.data.mongodb.uri=mongodb://localhost:27017/company_employees_test
spring.data.mongodb.database=company_employees_test

# JWT asimetrico (RS256): sin claves configuradas, el servicio genera un par RSA
# efimero al arrancar. Para las pruebas basta, porque firma y verifica en la misma instancia.
jwt.expiration-minutes=60

# El seed automatico se desactiva: cada prueba controla sus propios datos.
app.seed.enabled=false

logging.level.com.companyemployees=WARN
logging.level.org.springframework.data.mongodb=WARN
logging.level.org.testcontainers=WARN
logging.level.com.github.dockerjava=WARN
