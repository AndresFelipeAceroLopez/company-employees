# =============================================
# Configuracion de la aplicacion
# =============================================
spring.application.name=company-employees
server.port=8080

# Carga overrides locales (secretos de desarrollo) si el archivo existe.
# application-local.properties esta ignorado por git; en produccion no existe y se omite.
spring.config.import=optional:classpath:application-local.properties

# =============================================
# MongoDB Configuration
# =============================================
# Los secretos NO se almacenan en este archivo.
# Definir las variables de entorno antes de arrancar:
#   MONGODB_URI       -> cadena de conexion completa (ej: mongodb+srv://user:pwd@host/...)
#   MONGODB_DATABASE  -> nombre de la base de datos (opcional, default company_employees_db)
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:company_employees_db}

# =============================================
# JWT (firma ASIMETRICA RS256)
# =============================================
# Se firma con la clave PRIVADA y se verifica con la PUBLICA (par RSA).
# Formato: Base64/PEM -> privada en PKCS#8, publica en X.509.
# Si NO se configuran, en desarrollo se genera un par EFIMERO (los tokens no
# sobreviven al reinicio). En produccion DEBEN definirse via variables de entorno.
jwt.private-key=${JWT_PRIVATE_KEY:}
jwt.public-key=${JWT_PUBLIC_KEY:}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# =============================================
# Seed de datos
# =============================================
# Controla si DataInitializer inserta companias/empleados/usuarios de prueba.
app.seed.enabled=${APP_SEED_ENABLED:false}
# Credenciales iniciales: SIN default. Definir via variables de entorno o perfil local.
app.seed.admin-email=${APP_SEED_ADMIN_EMAIL:}
app.seed.admin-password=${APP_SEED_ADMIN_PASSWORD:}
app.seed.user-email=${APP_SEED_USER_EMAIL:}
app.seed.user-password=${APP_SEED_USER_PASSWORD:}

# =============================================
# Actuator (health del sistema)
# =============================================
# Solo se expone el endpoint de health (no metrics, env, etc.).
management.endpoints.web.exposure.include=health
# Muestra el detalle de componentes (incluye estado de MongoDB).
management.endpoint.health.show-details=always
# Habilita el indicador de salud de MongoDB.
management.health.mongo.enabled=true
# Incluye /actuator/health en la documentacion de Swagger UI.
springdoc.show-actuator=true

# =============================================
# Logging
# =============================================
logging.level.root=INFO
logging.level.com.companyemployees=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO

logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{36} - %msg%n
logging.file.name=logs/company-employees.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%-5level] %logger{36} - %msg%n
spring.profiles.active=local